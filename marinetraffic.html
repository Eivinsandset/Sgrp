<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden; 
        }
        /* Dette er "tvangstrøya" som tvinger kartet til å bli stort */
        iframe#vesselfinder, .vesselfinder-container iframe {
            height: 100vh !important;
            min-height: 100vh !important;
            width: 100% !important;
        }
    </style>
</head>
<body>

    <script type="text/javascript">
        var width = "100%";
        var height = "100%"; // Vi ber om 100%, men skriptet ignorerer det ofte...
        var latitude = "60.4227";
        var longitude = "5.0028";
        var zoom = "12";
        var names = true;
        var click_to_activate = false;
    </script>
    <script type="text/javascript" src="https://www.vesselfinder.com/aismap.js"></script>

    <script>
        // Dette lille skriptet kjører rett etterpå og tvinger høyden på plass
        setInterval(function() {
            var frames = document.getElementsByTagName('iframe');
            for (var i = 0; i < frames.length; i++) {
                if (frames[i].src.includes('vesselfinder')) {
                    frames[i].style.height = '100vh';
                }
            }
        }, 1000);
    </script>

</body>
</html>
