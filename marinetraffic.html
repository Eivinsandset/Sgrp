<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>VesselFinder Sidebar</title>
    <style>
        /* Fjerner alt av marger og tvinger siden til å være 100% av skjermen */
        body, html {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            background-color: #f4f4f4;
        }
        /* Denne biten sørger for at kartet strekker seg helt ned */
        #vesselfinder-container {
            width: 100%;
            height: 100%;
        }
        iframe {
            min-height: 100vh !important;
        }
    </style>
</head>
<body>

    <div id="vesselfinder-container">
        <script type="text/javascript">
            // Vi setter height til et veldig høyt tall eller "100%" 
            // for å tvinge skriptet til å fylle hele sidebaren din.
            var width = "100%";
            var height = "100%"; 
            var latitude = "60.4227";
            var longitude = "5.0028";
            var zoom = "12";
            var names = true;
            var click_to_activate = false;
        </script>
        <script type="text/javascript" src="https://www.vesselfinder.com/aismap.js"></script>
    </div>

</body>
</html>
