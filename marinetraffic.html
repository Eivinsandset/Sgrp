<!DOCTYPE html>
<html>
<head>
    <title>MarineTraffic Map Embed</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
        }

        #mapContainer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div id="mapContainer">
        <script type="text/javascript">
            width='100%';
            height='100%';
            border='0';
            shownames='true';
            latitude='60.4227';
            longitude='5.0028';
            zoom='12';
            maptype='1';
            trackvessel='0';
            fleet='';
        </script>
        <script type="text/javascript" src="https://www.marinetraffic.com/js/embed.js"></script>
    </div>
</body>
</html>
